<div class="page active" id="page-favourites" style="padding:2rem 6%;background:var(--gray);min-height:calc(100vh - 68px);">
  <div style="margin-bottom:2rem;">
    <div class="section-tag">My Collection</div>
    <div class="section-title" style="font-size:28px;margin-bottom:4px">My Favourites</div>
    <p style="color:var(--text2);font-size:14px">Meals you've saved for quick access</p>
  </div>
  <div class="fav-grid">
    <div class="fav-card">
      <button class="fav-heart" onclick="removeFav(this)" title="Remove">❤️</button>
      <div class="fav-img">🍕</div>
      <div class="fav-body">
        <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;">
          <span class="pill pill-red">-71% off</span>
          <span class="pill pill-orange">Last 2!</span>
        </div>
        <div class="fav-name">Margherita Pizza (large)</div>
        <div class="fav-rest">Forno Rosso · 0.3 km</div>
        <div class="fav-footer">
          <div>
            <div class="price-new">$3.50</div>
            <div class="price-old">$12.00</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            <div class="food-timer urgent" style="font-size:11px;padding:4px 10px;">
              <div class="timer-dot"></div>7 min
            </div>
            <button class="btn-sm btn-sm-primary">Reserve →</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
